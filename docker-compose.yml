# Local / dev stack.
# Parent: /data-disk/applications/vaspartners
# App:    ./vaspartners  (same pattern as mvasportal/mvasportal)
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: vaspartners
      POSTGRES_USER: vas
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      # PG 18+ volume root (not .../data)
      - vas_pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vas -d vaspartners"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    environment:
      DATABASE_URL: postgres://vas:secret@postgres:5432/vaspartners
      # session mode allows real prepared statements (avoids Laravel bool→int + emulate-prepares bugs on Postgres)
      POOL_MODE: session
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./vaspartners
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    env_file: ./vaspartners/backend/.env
    environment:
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      DB_CONNECTION: pgsql
      DB_HOST: pgbouncer
      DB_PORT: "5432"
      DB_DATABASE: vaspartners
      DB_USERNAME: vas
      DB_PASSWORD: secret
      DB_EMULATE_PREPARES: "false"
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      SANCTUM_STATEFUL_DOMAINS: localhost:3000,127.0.0.1:3000
      VAS_SEED_ON_START: "true"
    volumes:
      - ./vaspartners/backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy

  queue:
    build:
      context: ./vaspartners
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    env_file: ./vaspartners/backend/.env
    environment:
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      DB_CONNECTION: pgsql
      DB_HOST: pgbouncer
      DB_PORT: "5432"
      DB_DATABASE: vaspartners
      DB_USERNAME: vas
      DB_PASSWORD: secret
      DB_EMULATE_PREPARES: "false"
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      VAS_SEED_ON_START: "false"
    volumes:
      - ./vaspartners/backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    command: ["php", "artisan", "queue:work", "redis", "--queue=sms,default", "--sleep=1", "--tries=3", "--timeout=60"]
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      WATCHPACK_POLLING: "true"
    volumes:
      - ./vaspartners/frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"
    depends_on:
      - backend

volumes:
  vas_pg:
  backend_vendor:
  frontend_node_modules:
