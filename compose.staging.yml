# Staging stack under parent /data-disk/applications/vaspartners
# (same layout idea as /data-disk/applications/mvasportal → mvasportal-*).
#
#   Production mvasportal: host :443 → localhost:30011 (UNCHANGED)
#   This staging stack:    host :8443 → vaspartners-nginx (Tele wildcard SSL)
#
# Ship:  ./deploy-staging.sh
# Access:
#   https://vaspartnersportal.ethiotelecom.et:8443
#   https://vaspartnersportal.ethiotelecom.et:8443/admin
#
name: vaspartners

x-backend-env: &backend-env
  APP_URL: https://vaspartnersportal.ethiotelecom.et:8443
  FRONTEND_URL: https://vaspartnersportal.ethiotelecom.et:8443
  DB_CONNECTION: pgsql
  DB_HOST: pgbouncer
  DB_PORT: "5432"
  DB_DATABASE: vaspartners
  DB_USERNAME: vas
  DB_PASSWORD: secret
  DB_EMULATE_PREPARES: "false"
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  SANCTUM_STATEFUL_DOMAINS: vaspartnersportal.ethiotelecom.et:8443
  FAYDA_REDIRECT_URI: https://vaspartnersportal.ethiotelecom.et:8443/callback
  VAS_SEED_ON_START: "true"
  TRUSTED_PROXIES: "*"

services:
  postgres:
    image: postgres:18-alpine
    container_name: vaspartners-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vaspartners
      POSTGRES_USER: vas
      POSTGRES_PASSWORD: secret
    ports:
      - "35432:5432"
    volumes:
      - vaspartners-pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vas -d vaspartners"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - vaspartners-network

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    container_name: vaspartners-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://vas:secret@postgres:5432/vaspartners
      POOL_MODE: session
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: scram-sha-256
    ports:
      - "36432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vaspartners-network

  redis:
    image: redis:7-alpine
    container_name: vaspartners-redis
    restart: unless-stopped
    ports:
      - "36379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - vaspartners-network

  backend:
    image: vaspartners-php:latest
    container_name: vaspartners-app
    build:
      context: ./vaspartners
      dockerfile: docker/php/Dockerfile.staging
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      <<: *backend-env
    volumes:
      - vaspartners-storage:/var/www/html/storage/app
      - vaspartners-logs:/var/www/html/storage/logs
      # Read-only MVAS dump + attachments for: php artisan vas:migrate-mvas-dump
      - /data-disk/applications/mvasportal/mvasportal/storage/app:/mvas-storage:ro
      - /data-disk/applications/mvasportal/dumps:/mvas-dumps:ro
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/up >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 180s
    networks:
      - vaspartners-network
    extra_hosts:
      - "smsgw.ethiotelecom.et:197.156.68.29"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  queue:
    image: vaspartners-php:latest
    container_name: vaspartners-queue
    build:
      context: ./vaspartners
      dockerfile: docker/php/Dockerfile.staging
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      <<: *backend-env
      VAS_RUN_BOOTSTRAP: "false"
      VAS_SEED_ON_START: "false"
    volumes:
      - vaspartners-storage:/var/www/html/storage/app
      - vaspartners-logs:/var/www/html/storage/logs
    command: ["php", "artisan", "queue:work", "redis", "--queue=sms,default", "--sleep=1", "--tries=3", "--timeout=60"]
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vaspartners-network
    extra_hosts:
      - "smsgw.ethiotelecom.et:197.156.68.29"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  frontend:
    image: vaspartners-web:latest
    container_name: vaspartners-frontend
    build:
      context: ./vaspartners
      dockerfile: docker/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://vaspartnersportal.ethiotelecom.et:8443/api/v1
        NEXT_PUBLIC_SITE_URL: https://vaspartnersportal.ethiotelecom.et:8443
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vaspartners-network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: vaspartners-nginx
    restart: unless-stopped
    ports:
      # Tele SSL in this container — production :443 stays with mvasportal-nginx
      - "8443:443"
    volumes:
      - ./vaspartners/docker/nginx/default.staging.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/nginx/ssl/fullchain-wildcard.crt:/etc/nginx/certs/fullchain.crt:ro
      - /etc/nginx/ssl/ethiotelecom-wildcard.key:/etc/nginx/certs/privkey.key:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - vaspartners-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  vaspartners-pg:
    name: vaspartners-pg
  vaspartners-storage:
    name: vaspartners-storage
  vaspartners-logs:
    name: vaspartners-logs

networks:
  vaspartners-network:
    name: vaspartners-network
    driver: bridge
